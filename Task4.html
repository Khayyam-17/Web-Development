<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        p{
            color: blue;
        }
        .web1{
            color: yellow;
        }
        #Dev{
            color: pink;
        }
    </style>
</head>
<body>
<div>
<!--Inline Style-->
<p style="color: red;">In this paragraph I'm using inline css</p>
<!--red-->
</div>

<br>
<div>
    <!--Internel CSs-->
<p>In this paragraph I'm using internel css</p>
<!-- blue -->
</div>

<br>
<div>
    <!--External CSS Style-->
    <p>In this paragraph I'm using external css</p>
    <!-- blue -->
</div> 
<br>
<div>
    <!--Class Style-->
    <p class="web1">In this Paragraph I'm using class style</p>
    <!-- yellow -->
</div>
<br>
<div>
    <!--ID style-->
    <p id="Dev">In this Paragraph I'm using ID style CSS</p>
<!-- pink -->
</div>
</body>
</html>
